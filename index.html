function checkSectionQuiz(sectionId, correctAnswer) {
    const selected = document.querySelector(`input[name="quiz-${sectionId}"]:checked`);
    const resultDiv = document.getElementById(`result-${sectionId}`);
    if (!selected) { resultDiv.textContent = '❌ Pilih jawaban!'; resultDiv.className = 'mt-2 text-sm text-red-600'; return; }
    const isCorrect = parseInt(selected.value) === correctAnswer;
    resultDiv.textContent = isCorrect ? '✅ Benar! Bagus sekali!' : '❌ Belum benar, coba lagi!';
    resultDiv.className = `mt-2 text-sm ${isCorrect ? 'text-green-600' : 'text-red-600'}`;
}

    return `

        <span class="inline-block text-xs px-3 py-1 rounded-full ${score>=75?'bg-accent-100 text-accent-700':'bg-red-100 text-red-600'}">${score>=75?'✅ Tuntas':'❌ Belum Tuntas'}</span>
